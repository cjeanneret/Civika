{{- if .Values.ragChunker.job.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "civika.fullname" . }}-rag-chunker
  labels:
    {{- include "civika.labels" . | nindent 4 }}
    app.kubernetes.io/component: rag-chunker
spec:
  parallelism: {{ .Values.ragChunker.job.parallelism }}
  completions: {{ .Values.ragChunker.job.completions }}
  backoffLimit: {{ .Values.ragChunker.job.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.ragChunker.job.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "civika.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: rag-chunker
    spec:
      restartPolicy: {{ .Values.ragChunker.job.restartPolicy }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.ragChunker.podSecurityContext | nindent 8 }}
      containers:
        - name: rag-chunker
          image: "{{ .Values.ragChunker.image.repository }}:{{ .Values.ragChunker.image.tag }}"
          imagePullPolicy: {{ .Values.ragChunker.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.ragChunker.securityContext | nindent 12 }}
          command:
            {{- toYaml .Values.ragChunker.command | nindent 12 }}
          env:
            - name: POSTGRES_HOST
              value: {{ include "civika.postgresRwHost" . | quote }}
            - name: POSTGRES_PORT
              value: {{ include "civika.postgresPort" . | quote }}
            - name: POSTGRES_USER
              value: {{ include "civika.postgresUser" . | quote }}
            - name: POSTGRES_DB
              value: {{ include "civika.postgresDatabase" . | quote }}
            - name: POSTGRES_SSLMODE
              value: {{ .Values.postgresql.sslMode | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "civika.postgresCredentialsSecretName" . }}
                  key: password
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "civika.backendSecretName" . }}
                  key: {{ .Values.backend.secrets.llmApiKeyKey }}
            - name: LLM_EMBEDDING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "civika.backendSecretName" . }}
                  key: {{ .Values.backend.secrets.llmEmbeddingApiKeyKey }}
            {{- range $name, $value := .Values.ragChunker.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.ragChunker.dataVolume.enabled }}
          volumeMounts:
            - name: rag-data
              mountPath: {{ .Values.ragChunker.dataVolume.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.ragChunker.resources | nindent 12 }}
      {{- if .Values.ragChunker.dataVolume.enabled }}
      volumes:
        - name: rag-data
          persistentVolumeClaim:
            claimName: {{ include "civika.ragDataPvcName" . }}
      {{- end }}
{{- end }}
