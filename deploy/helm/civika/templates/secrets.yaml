{{- if not .Values.backend.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "civika.backendSecretName" . }}
  labels:
    {{- include "civika.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  {{ .Values.backend.secrets.llmApiKeyKey }}: {{ .Values.backend.secrets.data.LLM_API_KEY | quote }}
  {{ .Values.backend.secrets.llmEmbeddingApiKeyKey }}: {{ .Values.backend.secrets.data.LLM_EMBEDDING_API_KEY | quote }}
  {{ .Values.backend.secrets.postgresPasswordKey }}: {{ .Values.backend.secrets.data.POSTGRES_PASSWORD | quote }}
---
{{- end }}
{{- if and (eq .Values.postgresql.mode "managed") (not .Values.postgresql.managed.existingCredentialsSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "civika.postgresCredentialsSecretName" . }}
  labels:
    {{- include "civika.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgresql.user | quote }}
  password: {{ .Values.postgresql.managed.credentials.password | quote }}
---
{{- end }}
{{- if and (eq .Values.postgresql.mode "external") (not .Values.postgresql.external.existingCredentialsSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "civika.postgresCredentialsSecretName" . }}
  labels:
    {{- include "civika.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: kubernetes.io/basic-auth
stringData:
  username: {{ include "civika.postgresUser" . | quote }}
  password: {{ .Values.postgresql.external.credentials.password | quote }}
{{- end }}
